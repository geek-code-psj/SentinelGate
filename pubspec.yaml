name: sentinelgate
description: SentinelGate - Decentralized Multi-Factor Spatial-Temporal Campus Authentication
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Face Detection & Liveness PAD (on-device, never uploads images) ──
  google_mlkit_face_detection: ^0.11.0
  camera: ^0.10.5+9

  # ── GPS & Geofencing ──
  geolocator: ^11.0.0

  # ── QR Scanning & Generation ──
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # ── Cryptography (HMAC-SHA256 + Android KeyStore vault) ──
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2

  # ── Offline-first local DB (Drift = Flutter's Room equivalent) ──
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Background WorkManager sync ──
  workmanager: ^0.9.0+3

  # ── Networking ──
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── State Management ──
  flutter_riverpod: ^2.5.1

  # ── Utilities ──
  uuid: ^4.4.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/
